{{ define "admin_login.html" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – Holy Trinity Church</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Lato', sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        body::before { content: '✝'; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 40rem; color: rgba(255,255,255,0.02); pointer-events: none; }
        .login-card { background: white; width: 400px; border-radius: 4px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative; z-index: 1; }
        .login-header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 2.5rem; text-align: center; color: white; }
        .login-header .cross { font-size: 2.5rem; color: #b8860b; margin-bottom: 0.5rem; }
        .login-header h1 { font-family: 'Playfair Display', serif; font-size: 1.3rem; }
        .login-header p { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-top: 0.3rem; letter-spacing: 2px; text-transform: uppercase; }
        .login-body { padding: 2rem; }
        .alert { padding: 0.8rem 1rem; background: #fff5f5; border-left: 4px solid #e53e3e; color: #c53030; border-radius: 2px; font-size: 0.85rem; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-label { display: block; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.3rem; color: #2d2d2d; }
        .form-control { width: 100%; padding: 0.75rem 1rem; border: 1px solid #e8e2d5; border-radius: 2px; font-family: 'Lato', sans-serif; font-size: 0.95rem; transition: border-color 0.2s; }
        .form-control:focus { outline: none; border-color: #b8860b; }
        .btn-submit { width: 100%; padding: 0.85rem; background: #b8860b; color: white; border: none; border-radius: 2px; font-family: 'Lato', sans-serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: background 0.2s; margin-top: 0.5rem; }
        .btn-submit:hover { background: #d4a017; }
        .back-link { text-align: center; margin-top: 1.5rem; }
        .back-link a { color: #7a7a7a; font-size: 0.85rem; text-decoration: none; }
        .back-link a:hover { color: #b8860b; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="cross">✝</div>
            <h1>Administration Panel</h1>
            <p>Holy Trinity Church</p>
        </div>
        <div class="login-body">
            {{ if .error }}<div class="alert">{{ .error }}</div>{{ end }}
            <form method="POST" action="/admin/login">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="admin@church.com" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Sign In</button>
            </form>
            <div class="back-link">
                <a href="/">← Back to Church Website</a>
            </div>
        </div>
    </div>
</body>
</html>
{{ end }}
